name: Deploy Doctor Sites to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      specialty:
        description: 'Specialty to deploy (e.g., dermatology)'
        required: true
        type: string
        default: 'dermatology'
      site-name:
        description: 'Site slug (e.g., dr-smith-derm)'
        required: true
        type: string
        default: 'dr-smith-derm'
      custom-domain:
        description: 'Custom domain (optional)'
        required: false
        type: string
        default: ''

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Debug - list workspace
        run: |
          echo "=== Workspace root ==="
          ls -la
          echo "=== Specialties ==="
          ls -la specialties/
          echo "=== Packages ==="
          ls -la packages/

      - name: Generate site
        env:
          SPECIALTY: ${{ github.event.inputs.specialty }}
          SITE_NAME: ${{ github.event.inputs.site-name }}
          CUSTOM_DOMAIN: ${{ github.event.inputs.custom-domain }}
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          
          const specialty = process.env.SPECIALTY;
          const name = process.env.SITE_NAME;
          const domain = process.env.CUSTOM_DOMAIN;
          
          const workspaceRoot = process.cwd();
          const specialtyDir = path.join(workspaceRoot, 'specialties', specialty);
          const templateDir = path.join(workspaceRoot, 'packages', 'astro-doctor-template');
          const outputDir = path.join(workspaceRoot, 'sites', name);
          
          console.log('DEBUG: workspaceRoot =', workspaceRoot);
          console.log('DEBUG: specialtyDir =', specialtyDir);
          console.log('DEBUG: templateDir =', templateDir);
          console.log('DEBUG: outputDir =', outputDir);
          console.log('DEBUG: specialty =', specialty);
          console.log('DEBUG: name =', name);
          console.log('DEBUG: domain =', domain);
          
          // Check directories exist
          if (!fs.existsSync(specialtyDir)) {
            console.error('Specialty dir not found:', specialtyDir);
            if (fs.existsSync(path.join(workspaceRoot, 'specialties'))) {
              fs.readdirSync(path.join(workspaceRoot, 'specialties')).forEach(f => console.log('  Available:', f));
            }
            process.exit(1);
          }
          if (!fs.existsSync(templateDir)) {
            console.error('Template dir not found:', templateDir);
            process.exit(1);
          }
           console.log('Copying template...');
          fs.cpSync(templateDir, outputDir, { recursive: true });
          console.log('✅ Template copied');
          
          console.log('Copying specialty content...');
          fs.cpSync(path.join(specialtyDir, 'services'), path.join(outputDir, 'src', 'content', 'services'), { recursive: true });
          fs.cpSync(path.join(specialtyDir, 'team'), path.join(outputDir, 'src', 'content', 'team'), { recursive: true });
          if (fs.existsSync(path.join(specialtyDir, 'assets'))) {
            fs.cpSync(path.join(specialtyDir, 'assets'), path.join(outputDir, 'public', 'assets'), { recursive: true, force: true });
          }
          console.log('✅ Specialty content copied');
          
          console.log('Injecting config...');
          fs.mkdirSync(path.join(outputDir, 'src', 'content', 'specialtyConfig'), { recursive: true });
          fs.cpSync(path.join(specialtyDir, 'config.json'), path.join(outputDir, 'src', 'content', 'specialtyConfig', 'specialtyConfig.json'));
          console.log('✅ Config copied');
          
          console.log('Writing astro config...');
          const configPath = path.join(outputDir, 'astro.config.mjs');
          const siteUrl = domain ? 'https://' + domain : 'https://' + name + '.github.io';
          const basePath = domain ? '/' : '/' + name + '/';
          
          const astroConfig = 'import { defineConfig } from \\'astro/config\\';\\n' +
            'import mdx from \\'@astrojs/mdx\\';\\n' +
            'import react from \\'@astrojs/react\\';\\n' +
            'import sitemap from \\'@astrojs/sitemap\\';\\n' +
            'import tailwind from \\'@astrojs/tailwind\\';\\n\\n' +
            'export default defineConfig({\\n' +
            '  site: \\'' + siteUrl + '\\',\\n' +
            '  base: \\'' + basePath + '\\',\\n' +
            '  output: \\'static\\',\\n' +
            '  integrations: [\\n' +
            '    mdx(),\\n' +
            '    react(),\\n' +
            '    sitemap(),\\n' +
            '    tailwind(),\\n' +
            '  ],\\n' +
            '  markdown: {\\n' +
            '    shikiConfig: { theme: \\'github-light\\' },\\n' +
            '  },\\n' +
            '  vite: {\\n' +
            '    plugins: [],\\n' +
            '  },\\n' +
            '});\\n';
          
          fs.writeFileSync(configPath, astroConfig);
          console.log('✅ Astro config written with site:', siteUrl);
          console.log('✅ Astro config written with base:', basePath);
          
          if (domain) {
            fs.writeFileSync(path.join(outputDir, 'public', 'CNAME'), domain);
            console.log('✅ CNAME created for', domain);
          }
          
          console.log('');
          console.log('🎉 Site created at', outputDir);
          "
        working-directory: .

      - name: Verify site generated
        run: |
          ls -la sites/
          ls -la sites/${{ github.event.inputs.site-name }}/

      - name: Install site dependencies
        run: npm install
        working-directory: sites/${{ github.event.inputs.site-name }}

      - name: Build site (with debug)
        run: |
          echo "=== Package.json ==="
          cat package.json
          echo ""
          echo "=== Astro config ==="
          cat astro.config.mjs
          echo ""
          npm run build
        working-directory: sites/${{ github.event.inputs.site-name }}

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        run: |
          cd sites/${{ github.event.inputs.site-name }}
          
          # Create orphan branch for this site
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git checkout --orphan "site-${{ github.event.inputs.site-name }}"
          git rm -rf .
          cp -r dist/* .
          
          # Add CNAME if exists
          if [ -f CNAME ]; then
            echo "Custom domain: $(cat CNAME)"
          fi
          
          git add .
          git commit -m "Deploy ${{ github.event.inputs.site-name }} to GitHub Pages"
          git push -f origin "site-${{ github.event.inputs.site-name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}