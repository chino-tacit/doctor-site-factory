name: Deploy Doctor Sites to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      specialty:
        description: 'Specialty to deploy (e.g., dermatology)'
        required: true
        type: string
      site-name:
        description: 'Site slug (e.g., dr-smith-derm)'
        required: true
        type: string
      custom-domain:
        description: 'Custom domain (optional)'
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # No npm ci at root - we don't need factory deps to generate site

      - name: Generate site
        run: |
          npx tsx packages/cli/src/index.ts \
            --specialty=${{ github.event.inputs.specialty || 'dermatology' }} \
            --name=${{ github.event.inputs.site-name || 'dr-smith-derm' }} \
            ${{ github.event.inputs.custom-domain && format('--domain={0}', github.event.inputs.custom-domain) }} \
            --skip-install

      - name: Verify site generated
        run: |
          ls -la sites/
          ls -la sites/${{ github.event.inputs.site-name || 'dr-smith-derm' }}/

      - name: Install site dependencies
        run: npm ci
        working-directory: sites/${{ github.event.inputs.site-name || 'dr-smith-derm' }}

      - name: Build site
        run: npm run build
        working-directory: sites/${{ github.event.inputs.site-name || 'dr-smith-derm' }}

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        run: |
          cd sites/${{ github.event.inputs.site-name || 'dr-smith-derm' }}
          
          # Create orphan branch for this site
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git checkout --orphan "site-${{ github.event.inputs.site-name || 'dr-smith-derm' }}"
          git rm -rf .
          cp -r dist/* .
          
          # Add CNAME if exists
          if [ -f CNAME ]; then
            echo "Custom domain: $(cat CNAME)"
          fi
          
          git add .
          git commit -m "Deploy ${{ github.event.inputs.site-name || 'dr-smith-derm' }} to GitHub Pages"
          git push -f origin "site-${{ github.event.inputs.site-name || 'dr-smith-derm' }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}